if('serviceWorker' in navigator){
  const sw=`
self.addEventListener('install',e=>{ self.skipWaiting(); });
self.addEventListener('activate',e=>{ e.waitUntil(clients.claim()); });
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET') return;
  e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
});
`;
  const blob=new Blob([sw],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}

function toKey(date){ return date.toISOString().split("T")[0]; }
function todayKey(){ return toKey(new Date()); }
function offsetKey(offset){ const d=new Date(); d.setDate(d.getDate()+offset); return toKey(d); }
function parseKey(k){ const [y,m,d]=k.split("-"); return new Date(+y,+m-1,+d); }
function load(key,def){ try{ const r=localStorage.getItem(key); return r?JSON.parse(r):def; }catch{ return def; } }
function save(key,d){ try{ localStorage.setItem(key,JSON.stringify(d)); }catch{} }

function getDaysRange(periodId, allData){
  if(periodId==="all"){
    const keys=Object.keys(allData).sort();
    if(!keys.length) return [];
    const start=parseKey(keys[0]);
    const end=new Date();
    const days=[];
    for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)) days.push(toKey(new Date(d)));
    return days;
  }
  const n=parseInt(periodId);
  return Array.from({length:n},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(n-1-i)); return toKey(d); });
}

function getMonthKey(k){ return k.slice(0,7); }
function getMonthLabel(mk){ const [y,m]=mk.split("-"); return new Date(+y,+m-1,1).toLocaleDateString("ru-RU",{month:"long",year:"numeric"}); }

// Объединённый список «привычек» для подсчёта и отображения: статичные + все добавки из реестра
function getEffectiveHabits(supplements, habits){
  const activeHabits=(habits||[]).filter(h=>!h.archivedAt).map(h=>({ id:h.id, label:h.label, icon:h.icon, isSupplement:false, supplement:null }));
  const suppHabits=(supplements||[]).map(s=>({ id:s.id, label:s.label, icon:s.icon, isSupplement:true, supplement:s }));
  return [...suppHabits, ...activeHabits];
}

function isHabitLocked(habit, dayKey){
  if(habit.isSupplement){
    return !isSupplementActiveOn(habit.supplement, dayKey);
  }
  return false;
}

function getMaxScore(dayKey, supplements, habits){
  const eh=getEffectiveHabits(supplements,habits);
  return eh.filter(h=>!isHabitLocked(h,dayKey)).length;
}

function getDayScore(day,dayKey,supplements,habits){
  if(!day) return 0;
  const k=dayKey||"0000-00-00";
  const eh=getEffectiveHabits(supplements,habits);
  return eh.filter(h=>!isHabitLocked(h,k)&&day.habits?.[h.id]).length;
}

function scoreColor(score,max){
  const r=score/max;
  if(r===0) return "#1c1c24";
  if(r<0.35) return "#7f1d1d";
  if(r<0.6)  return "#92400e";
  if(r<0.8)  return "#166534";
  return "#15803d";
}

function getWeekStart(){
  const d=new Date();
  const diff=(d.getDay()===0?-6:1-d.getDay());
  d.setDate(d.getDate()+diff);
  return toKey(d);
}

// --- Добавки: версии и периоды активности ---

function getActiveVersion(supplement, dayKey){
  if(!supplement?.versions?.length) return null;
  const k=dayKey||todayKey();
  return supplement.versions.find(v=>v.from<=k&&(v.until==null||k<=v.until)) || null;
}

function isSupplementActiveOn(supplement, dayKey){
  return !!getActiveVersion(supplement, dayKey);
}

function getCurrentVersion(supplement){
  if(!supplement?.versions?.length) return null;
  // открытая версия (until==null) — приоритет; иначе самая последняя по дате from
  const open=supplement.versions.find(v=>v.until==null);
  if(open) return open;
  return [...supplement.versions].sort((a,b)=>b.from.localeCompare(a.from))[0] || null;
}

function supplementStatus(supplement){
  if(supplement?.archived) return "archived";
  const cv=getCurrentVersion(supplement);
  if(!cv) return "archived";
  if(cv.until==null){
    return cv.from>todayKey() ? "scheduled" : "active";
  }
  return "paused";
}

function formatDose(v){
  if(!v) return "";
  if(v.mode==="composite"){
    return formatIngredientsShort(v.ingredients);
  }
  if(v.amount==null||v.amount==="") return "";
  return `${v.amount} ${v.unit||"мг"}`;
}

function formatIngredient(ing){
  if(!ing||ing.amount==null||ing.amount==="") return ing?.name||"";
  return `${ing.name} ${ing.amount} ${ing.unit||"мг"}`;
}

function formatIngredientsShort(ingredients,limit){
  const list=ingredients||[];
  if(!list.length) return "";
  const n=limit||2;
  const shown=list.slice(0,n).map(formatIngredient).join(" · ");
  const rest=list.length-n;
  return rest>0?`${shown} · +${rest}`:shown;
}

function supplementSubtitle(supplement, dayKey){
  const v=getActiveVersion(supplement, dayKey);
  if(!v) return "";
  if(v.mode==="composite"){
    return [v.brand, formatIngredientsShort(v.ingredients)].filter(Boolean).join(" · ");
  }
  return [v.brand, v.form, formatDose(v)].filter(Boolean).join(" · ");
}

function TodayTab({data,setData,supplements,habits,dayFields}){
  const [dayOffset,setDayOffset]=React.useState(0);
  const key=offsetKey(dayOffset);
  const day=data[key]||{};
  function set(patch){ const u={...data,[key]:{...day,...patch}}; setData(u); save(SK_DAYS,u); }
  function toggleHabit(id){ set({habits:{...day.habits,[id]:!day.habits?.[id]}}); }
  const viewedDate=parseKey(key);
  const dayTitle=dayOffset===0?"СЕГОДНЯ":"ВЧЕРА";
  const dayWorkoutLabel=dayOffset===0?"Тренировка сегодня":"Тренировка вчера";

  const weekStart=getWeekStart();
  const weekWorkouts=Object.entries(data).filter(([k,v])=>k>=weekStart&&v?.habits?.workout).length;
  const curMonth=todayKey().slice(0,7);
  const monthWorkouts=Object.entries(data).filter(([k,v])=>k.startsWith(curMonth)&&v?.habits?.workout).length;
  const todayWorkout=!!day.habits?.workout;
  function toggleWorkout(){ set({habits:{...day.habits,workout:!todayWorkout}}); }

  const maxScore=getMaxScore(key,supplements,habits);
  const score=getDayScore(day,key,supplements,habits);
  const pct=maxScore>0?Math.round((score/maxScore)*100):0;

  return (
    <div style={{padding:"12px 14px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:13,color:"#6b7280"}}>
          {viewedDate.toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"})}
        </div>
        <div style={{textAlign:"center"}}>

            border:`1px solid ${todayWorkout?"#166534":"#1e1e28"}`,
            color:todayWorkout?"#4ade80":"#6b7280",
            fontSize:13,cursor:"pointer",transition:"all 0.12s",

            <div style={{fontSize:9,color:"#4b5563"}}>на этой неделе</div>
          </div>
          <div style={{flex:1,background:"#0d0d12",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"#4ade80"}}>{monthWorkouts}</div>
            <div style={{fontSize:9,color:"#4b5563"}}>в {new Date().toLocaleDateString("ru-RU",{month:"long"})}</div>
          </div>
        </div>

        {getEffectiveHabits(supplements,habits).filter(h=>{

          const locked=isHabitLocked(h,key);
          if(!locked) return true;
          // показываем заблокированную добавку только если у неё есть версия, которая начнётся позже
          return h.supplement?.versions?.some(v=>v.from>key);
        }).map(h=>{
          const done=!!day.habits?.[h.id];
          const locked=isHabitLocked(h,key);
          const subtitle=h.isSupplement&&!locked?supplementSubtitle(h.supplement,key):"";
          const nextVersion=h.isSupplement&&locked?h.supplement?.versions?.find(v=>v.from>key&&(v.until==null||key<=v.until)):null;
          return (
            <button key={h.id} disabled={locked} onClick={()=>!locked&&toggleHabit(h.id)} style={{
              display:"flex",alignItems:"center",gap:12,width:"100%",
              background:locked?"#0d0d12":done?"#052e16":"#0d0d12",
              border:`1px solid ${locked?"#1e1e28":done?"#166534":"#1e1e28"}`,
              borderRadius:8,padding:"11px 12px",marginBottom:6,
              color:locked?"#374151":done?"#4ade80":"#6b7280",
              fontSize:14,cursor:locked?"default":"pointer",transition:"all 0.12s",textAlign:"left",
              opacity:locked?0.55:1,
            }}>
              <span style={{fontSize:18,lineHeight:1}}>{h.icon}</span>
              <span style={{flex:1}}>
                <div>{h.label}{locked&&nextVersion&&<span style={{fontSize:10,color:"#374151",marginLeft:6}}>с {parseKey(nextVersion.from).toLocaleDateString("ru-RU",{day:"numeric",month:"long"})}</span>}</div>
                {subtitle&&<div style={{fontSize:10,color:done?"#4ade80aa":"#4b5563",marginTop:1}}>{subtitle}</div>}
              </span>
              <span style={{fontSize:18}}>{locked?"🔒":done?"✓":"○"}</span>
            </button>
          );
        })}
        <div style={{marginTop:10}}>
          {/* Поля типа "choice" из dayFields (бывшие Быстрые углеводы и т.д.) */}
        </div>
      </div>

      {/* Кастомные поля дня */}
      {(dayFields||[]).filter(f=>!f.archivedAt).map(field=>(
        <DayFieldInput key={field.id} field={field} value={day[field.id]} onChange={v=>set({[field.id]:v})}/>
      ))}

      <div style={S.card}>
        <span style={S.lbl}>Заметки дня</span>
        <textarea value={day.notes||""} onChange={e=>set({notes:e.target.value})}
          placeholder="Как прошло, что заметил..."
          style={{...S.input,resize:"none",minHeight:80}}/>
      </div>
    </div>
  );
}

function StatsTab({data,supplements,habits}){
  const [period,setPeriod]=React.useState("30");
  const days=React.useMemo(()=>getDaysRange(period,data),[period,data]);
  const filled=days.filter(k=>data[k]);
  const totalDays=filled.length;

  const streak=React.useMemo(()=>{
    let s=0;
    for(let i=0;i<365;i++){
      const d=new Date(); d.setDate(d.getDate()-i);
      const k=toKey(d);
      const day=data[k];
      if(day&&getDayScore(day,k,supplements,habits)>=Math.floor(getMaxScore(k,supplements,habits)*0.7)) s++;
      else break;
    }
    return s;
  },[data,supplements]);

  const workoutDays=days.filter(k=>data[k]?.habits?.workout).length;
  const sryvy=days.filter(k=>data[k]?.fastCarbs===2).length;
  const noCarbsPct=totalDays?Math.round((days.filter(k=>data[k]&&(data[k].fastCarbs==null||data[k].fastCarbs===0)).length/totalDays)*100):0;
  const moodDays=days.filter(k=>data[k]?.mood!=null);
  const avgMood=moodDays.length?(moodDays.reduce((s,k)=>s+data[k].mood,0)/moodDays.length).toFixed(1):null;
  const erDays=days.filter(k=>data[k]?.erection!=null);
  const avgEr=erDays.length?(erDays.reduce((s,k)=>s+data[k].erection,0)/erDays.length).toFixed(1):null;
  const goodSleepCount=days.filter(k=>data[k]?.sleepQuality===3).length;
  const habitStats=getEffectiveHabits(supplements,habits).map(h=>{
    const eligibleDays=days.filter(k=>!isHabitLocked(h,k));
    const count=eligibleDays.filter(k=>data[k]?.habits?.[h.id]).length;
    return {...h,pct:eligibleDays.length?Math.round((count/eligibleDays.length)*100):0};
  });

  const workoutsByMonth=React.useMemo(()=>{
    const map={};
    Object.entries(data).forEach(([k,v])=>{ if(v?.habits?.workout){ const mk=getMonthKey(k); map[mk]=(map[mk]||0)+1; } });
    return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).slice(-6);
  },[data]);

  const heatDays=React.useMemo(()=>Array.from({length:90},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(89-i)); return toKey(d); }),[]);

  return (
    <div style={{padding:"16px 14px 0"}}>
      
      <PeriodSelector value={period} onChange={setPeriod}/>
      <div style={{fontSize:10,color:"#4b5563",marginBottom:14}}>{totalDays} дней с данными за выбранный период</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
        {[{label:"Стрик",value:streak+"🔥",sub:"70%+ привычек"},{label:"Тренировок",value:workoutDays,sub:"за период"},{label:"Срывов",value:sryvy,sub:"по углеводам"}].map(s=>(
          <div key={s.label} style={{...S.card,marginBottom:0,textAlign:"center",padding:"12px 8px"}}>
            <div style={{fontSize:10,color:"#4b5563",marginBottom:4}}>{s.label}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"#e2ddd6",lineHeight:1}}>{s.value}</div>
            <div style={{fontSize:9,color:"#374151",marginTop:2}}>{s.sub}</div>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
        {[{label:"Настроение",value:avgMood?MOOD.find(m=>m.v===Math.round(+avgMood))?.l+" "+avgMood:"—",sub:"средн."},{label:"Эрекция",value:avgEr?avgEr+"/3":"—",sub:"средний балл"},{label:"Отл. сон",value:goodSleepCount,sub:"дней"}].map(s=>(
          <div key={s.label} style={{...S.card,marginBottom:0,textAlign:"center",padding:"12px 8px"}}>
            <div style={{fontSize:10,color:"#4b5563",marginBottom:4}}>{s.label}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#e2ddd6",lineHeight:1}}>{s.value}</div>
            <div style={{fontSize:9,color:"#374151",marginTop:2}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {workoutsByMonth.length>0&&(
        <div style={S.card}>
          <span style={S.lbl}>Тренировки по месяцам</span>
          {workoutsByMonth.map(([mk,count])=>(
            <div key={mk} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:12,color:"#9ca3af",textTransform:"capitalize"}}>{getMonthLabel(mk)}</span>
                <span style={{fontSize:13,fontWeight:600,color:"#4ade80"}}>{count}</span>
              </div>
              <div style={{height:4,background:"#1e1e28",borderRadius:3}}>
                <div style={{height:"100%",width:`${Math.min((count/20)*100,100)}%`,background:"#4ade80",borderRadius:3}}/>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={S.card}>
        <span style={S.lbl}>Привычки — выполнение</span>
        {[...habitStats,{id:"noCarbs",label:"Без срывов (углеводы)",icon:"🍭",pct:noCarbsPct}].map(h=>(
          <div key={h.id} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:13,color:"#9ca3af"}}>{h.icon} {h.label}</span>
              <span style={{fontSize:13,fontWeight:600,color:h.pct>=70?"#4ade80":h.pct>=40?"#eab308":"#f87171"}}>{h.pct}%</span>
            </div>
            <div style={{height:4,background:"#1e1e28",borderRadius:3}}>
              <div style={{height:"100%",width:`${h.pct}%`,background:h.pct>=70?"#4ade80":h.pct>=40?"#eab308":"#f87171",borderRadius:3,transition:"width 0.4s"}}/>
            </div>
          </div>
        ))}
      </div>

      <div style={S.card}>
        <span style={S.lbl}>Настроение</span>
        <div style={{display:"flex",gap:2,alignItems:"flex-end",height:60}}>
          {days.slice(-60).map(k=>{
            const mood=data[k]?.mood;
            const colors=["","#7f1d1d","#b45309","#854d0e","#166534","#15803d"];
            return <div key={k} style={{flex:1}}><div style={{width:"100%",borderRadius:"2px 2px 0 0",height:mood?`${mood*12}px`:2,background:mood?colors[mood]:"#1e1e28",transition:"height 0.3s"}}/></div>;
          })}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:9,color:"#374151"}}>
          <span>{days.length?parseKey(days[Math.max(0,days.length-60)]).toLocaleDateString("ru-RU",{day:"numeric",month:"short"}):""}</span>
          <span>сегодня</span>
        </div>
      </div>

      <div style={S.card}>
        <span style={S.lbl}>Активность — 90 дней</span>
        <div style={{display:"grid",gridTemplateColumns:"repeat(15,1fr)",gap:3}}>
          {heatDays.map(k=>(
            <div key={k} style={{aspectRatio:"1",borderRadius:3,background:scoreColor(getDayScore(data[k],k,supplements,habits),getMaxScore(k,supplements,habits)),border:k===todayKey()?"1px solid #4ade80":"none",position:"relative"}}>
              {data[k]?.habits?.workout&&<div style={{position:"absolute",top:1,right:1,width:3,height:3,borderRadius:"50%",background:"#4ade80"}}/>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ScheduleTab(){
  const [sections,setSections]=React.useState(()=>load(SK_SCHEDULE,defaultSchedule()));
  const [editMode,setEditMode]=React.useState(false);
  const [showHistory,setShowHistory]=React.useState(false);
  const [history,setHistory]=React.useState(()=>load(SK_SCHEDULE_HISTORY,[]));

  // snapshot текущего графика сохраняется при выходе из редактирования
  function persistEdit(next){
    // сохраняем текущее состояние в историю перед заменой
    const snapshot={ savedAt: new Date().toISOString(), sections };
    const newHistory=[snapshot,...history].slice(0,30); // не больше 30 снимков
    setHistory(newHistory);
    save(SK_SCHEDULE_HISTORY, newHistory);
    setSections(next);
    save(SK_SCHEDULE, next);
  }

  function persist(next){ setSections(next); save(SK_SCHEDULE,next); }

  function finishEdit(){
    persistEdit(sections); // фиксируем историю при выходе
    setEditMode(false);
  }

  function restoreSnapshot(snap){
    persistEdit(snap.sections);
    setShowHistory(false);
  }

  // --- разделы ---
  function addSection(){
    persist([...sections,{ id:newSectionId(), title:"Новый раздел", rows:[] }]);
  }
  function updateSectionTitle(id,title){
    persist(sections.map(s=>s.id===id?{...s,title}:s));
  }
  function deleteSection(id){
    persist(sections.filter(s=>s.id!==id));
  }
  function moveSection(id,dir){
    const idx=sections.findIndex(s=>s.id===id);
    const next=idx+dir;
    if(next<0||next>=sections.length) return;
    const arr=[...sections];
    [arr[idx],arr[next]]=[arr[next],arr[idx]];
    persist(arr);
  }

  // --- строки ---
  function addRow(sectionId){
    persist(sections.map(s=>s.id!==sectionId?s:{
      ...s, rows:[...s.rows,{ id:newRowId(), time:"", text:"" }]
    }));
  }
  function updateRow(sectionId,rowId,patch){
    persist(sections.map(s=>s.id!==sectionId?s:{
      ...s, rows:s.rows.map(r=>r.id===rowId?{...r,...patch}:r)
    }));
  }
  function deleteRow(sectionId,rowId){
    persist(sections.map(s=>s.id!==sectionId?s:{
      ...s, rows:s.rows.filter(r=>r.id!==rowId)
    }));
  }
  function moveRow(sectionId,rowId,dir){
    persist(sections.map(s=>{
      if(s.id!==sectionId) return s;
      const idx=s.rows.findIndex(r=>r.id===rowId);
      const next=idx+dir;
      if(next<0||next>=s.rows.length) return s;
      const rows=[...s.rows];
      [rows[idx],rows[next]]=[rows[next],rows[idx]];
      return {...s,rows};
    }));
  }

  function formatSavedAt(iso){
    const d=new Date(iso);
    return d.toLocaleDateString("ru-RU",{day:"numeric",month:"long",year:"numeric"})
      +" "+d.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  }

                <div style={{fontSize:10,color:"#4b5563",marginTop:2}}>
                  {snap.sections?.length||0} разд. · {snap.sections?.reduce((sum,s)=>sum+(s.rows?.length||0),0)||0} строк
                </div>
              </div>
              <button onClick={()=>restoreSnapshot(snap)} style={{
                padding:"7px 12px",borderRadius:8,fontSize:12,cursor:"pointer",
                background:"#052e16",border:"1px solid #166534",color:"#4ade80",
              }}>Восстановить</button>
            </div>
            {snap.sections?.map((sec,si)=>(
              <div key={si} style={{marginBottom:6}}>
                <div style={{fontSize:11,color:"#6b7280",fontWeight:600,marginBottom:3}}>{sec.title}</div>
                {sec.rows?.map((row,ri)=>(

                    <span style={{fontSize:10,color:"#4ade80"}}>{row.time}</span>
                    <span style={{fontSize:10,color:"#4b5563",lineHeight:1.3}}>{row.text}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        ))}
      </div>
    );
  }

  return (

        <div style={{display:"flex",gap:8}}>

          )}
          <button onClick={()=>{ if(editMode) finishEdit(); else setEditMode(true); }} style={{
            padding:"8px 16px",borderRadius:8,fontSize:12,cursor:"pointer",
            background:editMode?"#052e16":"#1e1e28",
            border:`1px solid ${editMode?"#166534":"#374151"}`,
            color:editMode?"#4ade80":"#9ca3af",
          }}>{editMode?"✓ Готово":"✏️ Редактировать"}</button>
        </div>
      </div>

      {sections.length===0&&!editMode&&(
        <div style={{...S.card,color:"#4b5563",textAlign:"center",fontSize:13}}>
          График пуст. Нажмите «Редактировать», чтобы добавить разделы.
        </div>
      )}

      {sections.map((section,si)=>(

                style={{...S.input,flex:1,fontWeight:600,fontSize:14,color:"#e2ddd6"}}

function downloadFile(name,content,type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function normalizeBackup(raw){
  const source=raw?.data||raw;
  return {
    days:source?.days&&typeof source.days==="object"?source.days:{},
    weights:Array.isArray(source?.weights)?source.weights:[],
    measures:Array.isArray(source?.measures)?source.measures:[],
    analyses:Array.isArray(source?.analyses)?source.analyses:[],
  };
}

function buildVersionFromForm(form){
  const base={ from:form.from, until:null, mode:form.mode, brand:form.brand };
  if(form.mode==="composite"){
    return {...base, form:"", amount:"", unit:"мг",
      ingredients: form.ingredients.filter(i=>i.name.trim()).map(i=>({...i, amount: i.amount===""?"":parseFloat(i.amount)})) };
  }
  return {...base, form:form.form, amount:form.amount===""?"":parseFloat(form.amount), unit:form.unit, ingredients:[] };
}

function SupplementCard({supplement, onUpdate, onArchive, onUnarchive}){
  const [expanded,setExpanded]=React.useState(false);
  const [editing,setEditing]=React.useState(false); // режим "изменить параметры" / "новая версия"
  const status=supplementStatus(supplement);
  const cv=getCurrentVersion(supplement);
  const [form,setForm]=React.useState(()=>emptyVersionForm(cv));

  React.useEffect(()=>{ if(editing) setForm(emptyVersionForm(cv)); },[editing]);

  const statusLabel={active:"Активна",paused:"На паузе",scheduled:"Запланирована",archived:"Архив"}[status];
  const statusColor={active:"#4ade80",paused:"#eab308",scheduled:"#818cf8",archived:"#4b5563"}[status];

  function applyNewVersion(){
    if(!form.from) return;
    // Закрываем открытую версию днём раньше новой даты (если новая версия её не опережает)
    // Отбрасываем версии, которые целиком начинаются на новую дату или позже — их вытесняет новая
    const kept=supplement.versions
      .filter(v=>v.from<form.from)
      .map(v=>v.until==null?{...v, until: dayBefore(form.from)}:v);
    const versions=[...kept, buildVersionFromForm(form)];
    onUpdate({...supplement, versions});
    setEditing(false);
  }

  function pause(){
    // закрываем вчерашним днём — сегодня добавка уже не активна
    const yesterday=dayBefore(todayKey());
    const versions=supplement.versions.map(v=>v.until==null?{...v, until: yesterday}:v);
    onUpdate({...supplement, versions});
  }

  function resume(){
    // открываем с сегодняшнего дня
    const todayK=todayKey();
    const versions=[...supplement.versions, {
      from:todayK, until:null,
      mode:cv?.mode||"simple", brand:cv?.brand||"", form:cv?.form||"",
      amount:cv?.amount??"", unit:cv?.unit||"мг",
      ingredients:cv?.ingredients?.map(i=>({...i}))||[]
    }];
    onUpdate({...supplement, versions});
  }

  const sortedVersions=[...supplement.versions].sort((a,b)=>b.from.localeCompare(a.from));

  return (
    <div style={S.card}>
      <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setExpanded(e=>!e)}>
        <span style={{fontSize:22}}>{supplement.icon}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:15,color:"#e2ddd6",fontWeight:600}}>{supplement.label}</div>
          <div style={{fontSize:11,color:"#6b7280",marginTop:1}}>
            {cv?(cv.mode==="composite"
              ?[cv.brand,formatIngredientsShort(cv.ingredients)].filter(Boolean).join(" · ")
              :[cv.brand,cv.form,formatDose(cv)].filter(Boolean).join(" · ")
            ):"—"}
          </div>
        </div>
        <span style={{fontSize:10,color:statusColor,border:`1px solid ${statusColor}`,borderRadius:6,padding:"3px 8px"}}>{statusLabel}</span>
        <span style={{fontSize:14,color:"#4b5563",marginLeft:4}}>{expanded?"▴":"▾"}</span>
      </div>

      {expanded&&(
        <div style={{marginTop:14}}>
          {!editing?(
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
              {status!=="archived"&&(
                <button onClick={()=>setEditing(true)} style={{...S.saveBtn,flex:"1 1 auto",padding:"9px 12px",fontSize:12}}>Изменить параметры</button>
              )}
              {(status==="active"||status==="scheduled")&&(
                <button onClick={pause} style={{flex:"1 1 auto",padding:"9px 12px",borderRadius:8,background:"#1a1200",border:"1px solid #854d0e",color:"#eab308",fontSize:12,cursor:"pointer"}}>⏸ Приостановить</button>
              )}
              {status==="paused"&&(
                <button onClick={resume} style={{flex:"1 1 auto",padding:"9px 12px",borderRadius:8,background:"#052e16",border:"1px solid #166534",color:"#4ade80",fontSize:12,cursor:"pointer"}}>▶ Возобновить</button>
              )}
              {status!=="archived"&&(

    </div>
  );
}

function dayBefore(dateKey){
  const d=parseKey(dateKey);
  d.setDate(d.getDate()-1);
  return toKey(d);
}

function SupplementsTab({supplements,setSupplements}){
  const [showNew,setShowNew]=React.useState(false);

  function persist(next){ setSupplements(next); save(SK_SUPPLEMENTS,next); }

  function updateOne(updated){
    persist(supplements.map(s=>s.id===updated.id?updated:s));
  }
  function archiveOne(id){
    const yesterday=dayBefore(todayKey());
    persist(supplements.map(s=>{
      if(s.id!==id) return s;
      const versions=s.versions.map(v=>v.until==null?{...v, until: yesterday}:v);
      return {...s, archived:true, versions};
    }));
  }
  function unarchiveOne(id){
    // сбрасываем флаг и открываем новую версию с сегодня
    const todayK=todayKey();
    persist(supplements.map(s=>{
      if(s.id!==id) return s;
      const cv=getCurrentVersion(s);
      const newVersion={ from:todayK, until:null, mode:cv?.mode||"simple", brand:cv?.brand||"", form:cv?.form||"", amount:cv?.amount??"", unit:cv?.unit||"мг", ingredients:cv?.ingredients?.map(i=>({...i}))||[] };
      return {...s, archived:false, versions:[...s.versions, newVersion]};
    }));
  }
  function createOne(supp){
    persist([...supplements, supp]);
    setShowNew(false);
  }

  const active=supplements.filter(s=>supplementStatus(s)!=="archived");
  const archivedOnly=supplements.filter(s=>supplementStatus(s)==="archived");

  return (
    <div style={{padding:"16px 14px 0"}}>
      
      <div style={{fontSize:11,color:"#4b5563",marginBottom:14}}>
        Бренд, форма и доза сохраняются по датам — прошлая история не меняется, даже если вы поменяете препарат сейчас.
      </div>

      {active.map(s=>(
        <SupplementCard key={s.id} supplement={s} onUpdate={updateOne} onArchive={archiveOne} onUnarchive={unarchiveOne}/>
      ))}

      {showNew ? (
        <NewSupplementForm onCreate={createOne} onCancel={()=>setShowNew(false)}/>
      ) : (
        <button onClick={()=>setShowNew(true)} style={{...S.saveBtn,marginBottom:14}}>+ Добавить добавку</button>
      )}

      {archivedOnly.length>0&&(
        <>
          <span style={{...S.lbl,marginTop:6}}>Архивные</span>
          {archivedOnly.map(s=>(
            <SupplementCard key={s.id} supplement={s} onUpdate={updateOne} onArchive={archiveOne} onUnarchive={unarchiveOne}/>
          ))}
        </>
      )}
    </div>
  );
}

let mealSeq=0;
function newMealId(){ mealSeq+=1; return "meal_"+Date.now()+"_"+mealSeq; }

const MACRO_FIELDS=[
  {id:"kcal",    label:"Калории",   unit:"ккал", color:"#f59e0b"},
  {id:"protein", label:"Белки",     unit:"г",    color:"#4ade80"},
  {id:"fat",     label:"Жиры",      unit:"г",    color:"#f87171"},
  {id:"carbs",   label:"Углеводы",  unit:"г",    color:"#818cf8"},
  {id:"fiber",   label:"Клетчатка", unit:"г",    color:"#34d399"},
];

const EMPTY_MEAL_FORM={name:"",kcal:"",protein:"",fat:"",carbs:"",fiber:""};

function NutritionTab(){
  const [dayOffset,setDayOffset]=React.useState(0);
  const key=offsetKey(dayOffset);
  const [data,setData]=React.useState(()=>load(SK_NUTRITION,{}));
  const [editing,setEditing]=React.useState(null);
  const [form,setForm]=React.useState(EMPTY_MEAL_FORM);

  const dayData=data[key]||{meals:[]};
  const meals=dayData.meals||[];

  // редактирование разрешено только для сегодня и вчера
  const canEdit=dayOffset>=-1;

  function persist(next){ setData(next); save(SK_NUTRITION,next); }
  function setDayMeals(nextMeals){ persist({...data,[key]:{...dayData,meals:nextMeals}}); }

  function openNew(){
    setForm(EMPTY_MEAL_FORM);
    setEditing("new");
  }

  function openEdit(meal){
    setForm({
      name:    meal.name,
      kcal:    meal.kcal??'',
      protein: meal.protein??'',
      fat:     meal.fat??'',
      carbs:   meal.carbs??'',
      fiber:   meal.fiber??'',
    });
    setEditing(meal.id);
  }

  function saveForm(){
    if(!form.name.trim()) return;
    const entry={
      id:      editing==="new"?newMealId():editing,
      name:    form.name.trim(),
      kcal:    form.kcal===''?null:parseFloat(form.kcal),
      protein: form.protein===''?null:parseFloat(form.protein),
      fat:     form.fat===''?null:parseFloat(form.fat),
      carbs:   form.carbs===''?null:parseFloat(form.carbs),
      fiber:   form.fiber===''?null:parseFloat(form.fiber),
    };
    if(editing==="new"){
      setDayMeals([...meals,entry]);
    } else {
      setDayMeals(meals.map(m=>m.id===editing?entry:m));
    }
    setEditing(null);
  }

  function deleteMeal(id){ setDayMeals(meals.filter(m=>m.id!==id)); }

  const fmt=v=>{
    if(v==null||v===0) return "0";
    return v%1===0?String(v):v.toFixed(1);
  };

  const totals=MACRO_FIELDS.reduce((acc,f)=>{
    acc[f.id]=meals.reduce((s,m)=>s+(m[f.id]??0),0);
    return acc;
  },{});

  const viewedDate=parseKey(key);
  const dateLabel=dayOffset===0?"Сегодня":dayOffset===-1?"Вчера":viewedDate.toLocaleDateString("ru-RU",{day:"numeric",month:"long"});

  // найдём самый ранний день с данными для ограничения навигации
  const earliestKey=Object.keys(data).sort()[0];

  return (
    <div style={{padding:"16px 14px 0"}}>
      

      {/* навигация по дням */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button
          onClick={()=>{ setDayOffset(o=>o-1); setEditing(null); }}
          disabled={earliestKey&&key<=earliestKey}
          style={{...arrowBtn,fontSize:16,opacity:(earliestKey&&key<=earliestKey)?0.3:1}}>←</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:13,color:"#9ca3af"}}>{dateLabel}</div>
          <div style={{fontSize:10,color:"#374151"}}>{viewedDate.toLocaleDateString("ru-RU",{weekday:"long"})}</div>
        </div>
        <button
          onClick={()=>{ setDayOffset(o=>Math.min(0,o+1)); setEditing(null); }}
          disabled={dayOffset===0}
          style={{...arrowBtn,fontSize:16,opacity:dayOffset===0?0.3:1}}>→</button>
      </div>

      {/* плашка "только просмотр" для старых дней */}
      {!canEdit&&(
        <div style={{background:"#0d0d12",border:"1px solid #1e1e28",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:11,color:"#4b5563",textAlign:"center"}}>
          Редактирование доступно только для сегодня и вчера
        </div>
      )}

      {/* итого за день */}
      {meals.length>0&&(
        <>
          <div style={{fontSize:10,color:"#4b5563",marginBottom:6,fontWeight:600,letterSpacing:"0.05em"}}>ИТОГО ЗА ДЕНЬ</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
            {MACRO_FIELDS.map(f=>(
              <div key={f.id} style={{background:"#0d0d12",border:"1px solid #1e1e28",borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
                <div style={{fontSize:15,fontWeight:700,color:f.color}}>{fmt(totals[f.id])}</div>
                <div style={{fontSize:9,color:"#4b5563",marginTop:1}}>{f.unit}</div>
                <div style={{fontSize:9,color:"#374151"}}>{f.label}</div>
              </div>
            ))}
          </div>
        </>
      )}

      {/* список приёмов */}
      {meals.length===0&&(
        <div style={{...S.card,color:"#4b5563",textAlign:"center",fontSize:13}}>
          Нет данных за этот день
        </div>
      )}
      {meals.map(meal=>(
        <div key={meal.id} style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{fontSize:14,color:"#e2ddd6",fontWeight:600,flex:1}}>{meal.name}</div>
            {canEdit&&(
              <div style={{display:"flex",gap:6,marginLeft:8}}>
                <button onClick={()=>openEdit(meal)} style={{...arrowBtn,fontSize:12}}>✏️</button>
                <button onClick={()=>deleteMeal(meal.id)} style={{...arrowBtn,color:"#f87171",border:"1px solid #991b1b",background:"#1a0000",fontSize:12}}>✕</button>
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
            {MACRO_FIELDS.map(f=>meal[f.id]!=null&&(
              <span key={f.id} style={{fontSize:11,color:f.color,background:"#0d0d12",border:"1px solid #1e1e28",borderRadius:6,padding:"3px 8px"}}>
                {fmt(meal[f.id])} {f.unit} {f.label.toLowerCase()}
              </span>
            ))}
          </div>
        </div>
      ))}

      {/* форма добавления/редактирования */}
      {editing&&canEdit&&(
        <div style={S.card}>
          <span style={S.lbl}>{editing==="new"?"Новый приём пищи":"Редактировать"}</span>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:11,color:"#4b5563",display:"block",marginBottom:3}}>Название</label>
            <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}
              style={S.input} placeholder="Завтрак / Обед / Ужин..."/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            {MACRO_FIELDS.map(f=>(
              <div key={f.id}>
                <label style={{fontSize:10,color:f.color,display:"block",marginBottom:3}}>{f.label}, {f.unit}</label>
                <input type="number" step="0.1" value={form[f.id]}
                  onChange={e=>setForm(fm=>({...fm,[f.id]:e.target.value}))}
                  style={S.input} placeholder="0"/>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={saveForm} style={{...S.saveBtn,flex:1}}>Сохранить</button>
            <button onClick={()=>setEditing(null)} style={{flex:1,padding:12,borderRadius:8,background:"#0d0d12",border:"1px solid #1e1e28",color:"#9ca3af",fontSize:14,cursor:"pointer"}}>Отмена</button>
          </div>
        </div>
      )}

      {!editing&&canEdit&&(
        <button onClick={openNew} style={{...S.saveBtn,marginBottom:14}}>
          + Добавить приём пищи
        </button>
      )}
    </div>
  );
}

function ExportImportSettings({allData, setAllData}){
  const [importError,setImportError]=React.useState("");
  const [imported,setImported]=React.useState(false);

  function exportAll(){
    const bundle={
      version:1,
      exportedAt: new Date().toISOString(),
      days:       load(SK_DAYS,{}),
      supplements:load(SK_SUPPLEMENTS,[]),
      habits:     load(SK_HABITS,[]),
      schedule:   load(SK_SCHEDULE,[]),
      scheduleHistory: load(SK_SCHEDULE_HISTORY,[]),
      analyses:   load(SK_ANALYSES,[]),
      measures:   load(SK_MEASURES,[]),
      weights:    load(SK_WEIGHTS,[]),
      nutrition:  load(SK_NUTRITION,{}),
    };
    const json=JSON.stringify(bundle,null,2);
    const blob=new Blob([json],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    const date=new Date().toISOString().slice(0,10);
    a.download=`tracker-backup-${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importAll(e){
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const bundle=JSON.parse(ev.target.result);
        if(!bundle.version||!bundle.days) throw new Error("Неверный формат файла");
        if(bundle.days)       save(SK_DAYS,bundle.days);
        if(bundle.supplements)save(SK_SUPPLEMENTS,bundle.supplements);
        if(bundle.habits)     save(SK_HABITS,bundle.habits);
        if(bundle.schedule)   save(SK_SCHEDULE,bundle.schedule);
        if(bundle.scheduleHistory) save(SK_SCHEDULE_HISTORY,bundle.scheduleHistory);
        if(bundle.analyses)   save(SK_ANALYSES,bundle.analyses);
        if(bundle.measures)   save(SK_MEASURES,bundle.measures);
        if(bundle.weights)    save(SK_WEIGHTS,bundle.weights);
        if(bundle.nutrition)  save(SK_NUTRITION,bundle.nutrition);
        setImportError("");
        setImported(true);
        setTimeout(()=>window.location.reload(),800);
      } catch(err){
        setImportError("Ошибка: "+err.message);
      }
    };
    reader.readAsText(file);
    e.target.value="";
  }

  return (
    <div>
      <div style={S.card}>
        <div style={{fontSize:13,color:"#e2ddd6",fontWeight:600,marginBottom:4}}>Экспорт данных</div>
        <div style={{fontSize:11,color:"#4b5563",marginBottom:10}}>Скачает JSON со всеми данными трекера. Сохраните в iCloud Drive как резервную копию.</div>
        <button onClick={exportAll} style={{...S.saveBtn}}>⬇ Скачать резервную копию</button>
      </div>
      <div style={S.card}>
        <div style={{fontSize:13,color:"#e2ddd6",fontWeight:600,marginBottom:4}}>Импорт данных</div>
        <div style={{fontSize:11,color:"#4b5563",marginBottom:10}}>Загрузите ранее скачанный JSON. Все текущие данные будут заменены.</div>
        <label style={{...S.saveBtn,display:"block",textAlign:"center",cursor:"pointer"}}>
          ⬆ Загрузить резервную копию
          <input type="file" accept=".json" onChange={importAll} style={{display:"none"}}/>
        </label>
        {importError&&<div style={{fontSize:11,color:"#f87171",marginTop:8}}>{importError}</div>}
        {imported&&<div style={{fontSize:11,color:"#4ade80",marginTop:8}}>Импорт успешен, перезагрузка...</div>}
      </div>
      <div style={S.card}>
        <div style={{fontSize:13,color:"#e2ddd6",fontWeight:600,marginBottom:4}}>Добавить на экран iPhone</div>
        <div style={{fontSize:11,color:"#6b7280",lineHeight:1.5}}>
          1. Откройте файл в Safari{"\n"}
          2. Нажмите кнопку «Поделиться» (□↑){"\n"}
          3. Выберите «На экран "Домой"»{"\n"}
          4. Нажмите «Добавить»{"\n\n"}
          Данные в режиме PWA хранятся отдельно от кэша браузера и не удаляются автоматически.
        </div>
      </div>
    </div>
  );
}

const SK_MIGRATED_V2 = "nt_migrated_v2";

function runMigrationOnce(){
  if(load(SK_MIGRATED_V2,false)) return;

  // Чистим записи дней от старых полей-привычек, которых больше нет в трекере
  const days=load(SK_DAYS,{});
  const removedHabitIds=["protein","coffeeBefore14","sleepOnTime"];
  let daysChanged=false;
  Object.keys(days).forEach(k=>{
    const d=days[k];
    if(!d) return;
    if(d.habits){
      removedHabitIds.forEach(id=>{
        if(id in d.habits){ delete d.habits[id]; daysChanged=true; }
      });
    }
    if("tinnitus" in d){ delete d.tinnitus; daysChanged=true; }
  });
  if(daysChanged) save(SK_DAYS,days);

  // Удаляем последнюю запись анализов — это могли быть чужие данные (анализы друга)
  const analyses=load(SK_ANALYSES,[]);
  if(analyses.length>0){
    save(SK_ANALYSES,analyses.slice(0,-1));
  }

  save(SK_MIGRATED_V2,true);
}
runMigrationOnce();

const SK_MIGRATED_V3 = "nt_migrated_v3";

function runMigrationV3Once(){
  if(load(SK_MIGRATED_V3,false)) return;
  // Инициализируем реестр добавок дефолтными значениями, если его ещё нет

// Миграция v8: совместимость с историей старого трекера друга.
// В старом трекере creatine/magnesium были habits, в новом — supplements.
// Дополнительно инициализируем дефолтные поля дня с учётом полей старого трекера.
const SK_MIGRATED_V8 = "nt_migrated_v8";

function runMigrationV8Once(){
  if(load(SK_MIGRATED_V8,false)) return;

  // Старые ключи привычек которые были в habits{} но теперь стали supplements:
  // creatine, magnesium — оставляем как есть в habits за прошлые дни,
  // они продолжат отображаться в истории через getEffectiveHabits.
  // Supplements автоматически создадутся с id "creatine"/"magnesium" — совпадение id обеспечит корректность.

  // Инициализируем дефолтные поля дня если их ещё нет
  if(!load(SK_DAY_FIELDS, null)){
    save(SK_DAY_FIELDS, defaultDayFields());
  }

  // Инициализируем дефолтные привычки если их ещё нет
  if(!load(SK_HABITS, null)){
    save(SK_HABITS, defaultHabits());
  }

  // Инициализируем дефолтные добавки если их ещё нет
  if(!load(SK_SUPPLEMENTS, null)){
    save(SK_SUPPLEMENTS, defaultSupplements());
  }

  save(SK_MIGRATED_V8, true);
}
runMigrationV8Once();

          <button key={n.id} onClick={()=>{ setShowSettings(false); setTab(n.id); }} style={S.navBtn(!showSettings&&tab===n.id)}>
            <span style={{fontSize:20}}>{n.icon}</span>
            <span>{n.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
