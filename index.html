function toKey(date){ return date.toISOString().split("T")[0]; }
function todayKey(){ return toKey(new Date()); }
function offsetKey(offset){ const d=new Date(); d.setDate(d.getDate()+offset); return toKey(d); }
function parseKey(k){ const [y,m,d]=k.split("-"); return new Date(+y,+m-1,+d); }
function load(key,def){ try{ const r=localStorage.getItem(key); return r?JSON.parse(r):def; }catch{ return def; } }
function save(key,d){ try{ localStorage.setItem(key,JSON.stringify(d)); }catch{} }

function getDaysRange(periodId, allData){
  if(periodId==="all"){
    const keys=Object.keys(allData).sort();
    if(!keys.length) return [];
    const start=parseKey(keys[0]);
    const end=new Date();
    const days=[];
    for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)) days.push(toKey(new Date(d)));
    return days;
  }
  const n=parseInt(periodId);
  return Array.from({length:n},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(n-1-i)); return toKey(d); });
}

function getMonthKey(k){ return k.slice(0,7); }
function getMonthLabel(mk){ const [y,m]=mk.split("-"); return new Date(+y,+m-1,1).toLocaleDateString("ru-RU",{month:"long",year:"numeric"}); }

function getDayScore(day){
  if(!day) return 0;
  const positives=HABITS.filter(h=>day.habits?.[h.id]).length;
  const noBadCarbs=(day.fastCarbs==null||day.fastCarbs===0)?1:0;
  return positives+noBadCarbs;
}

function scoreColor(score,max){
  const r=score/max;
  if(r===0) return "#1c1c24";
  if(r<0.35) return "#7f1d1d";
  if(r<0.6)  return "#92400e";
  if(r<0.8)  return "#166534";
  return "#15803d";
}

function getWeekStart(){
  const d=new Date();
  const diff=(d.getDay()===0?-6:1-d.getDay());
  d.setDate(d.getDate()+diff);
  return toKey(d);
}

  const [selected,setSelected]=React.useState(null);

  const firstDay=new Date(viewYear,viewMonth,1);
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const startDow=(firstDay.getDay()+6)%7;
  const monthName=firstDay.toLocaleDateString("ru-RU",{month:"long",year:"numeric"});
  const maxScore=HABITS.length+1;

function StatsTab({data}){
  const [period,setPeriod]=React.useState("30");
  const days=React.useMemo(()=>getDaysRange(period,data),[period,data]);
  const filled=days.filter(k=>data[k]);
  const totalDays=filled.length;
  const maxScore=HABITS.length+1;

  const streak=React.useMemo(()=>{
    let s=0;
    for(let i=0;i<365;i++){
      const d=new Date(); d.setDate(d.getDate()-i);
      const k=toKey(d);
      const day=data[k];
      if(day&&getDayScore(day)>=Math.floor(maxScore*0.7)) s++;
      else break;
    }
    return s;
  },[data]);

  const workoutDays=days.filter(k=>data[k]?.habits?.workout).length;
  const sryvy=days.filter(k=>data[k]?.fastCarbs===2).length;
  const noCarbsPct=totalDays?Math.round((days.filter(k=>data[k]&&(data[k].fastCarbs==null||data[k].fastCarbs===0)).length/totalDays)*100):0;
  const moodDays=days.filter(k=>data[k]?.mood!=null);
  const avgMood=moodDays.length?(moodDays.reduce((s,k)=>s+data[k].mood,0)/moodDays.length).toFixed(1):null;
  const erDays=days.filter(k=>data[k]?.erection!=null);
  const avgEr=erDays.length?(erDays.reduce((s,k)=>s+data[k].erection,0)/erDays.length).toFixed(1):null;
  const tinnitusCount=days.filter(k=>data[k]?.tinnitus===true).length;
  const goodSleepCount=days.filter(k=>data[k]?.sleepQuality===3).length;
  const habitStats=HABITS.map(h=>{ const count=days.filter(k=>data[k]?.habits?.[h.id]).length; return {...h,pct:totalDays?Math.round((count/totalDays)*100):0}; });

  const workoutsByMonth=React.useMemo(()=>{
    const map={};
    Object.entries(data).forEach(([k,v])=>{ if(v?.habits?.workout){ const mk=getMonthKey(k); map[mk]=(map[mk]||0)+1; } });
    return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).slice(-6);
  },[data]);

  const heatDays=React.useMemo(()=>Array.from({length:90},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(89-i)); return toKey(d); }),[]);

  return (
    <div style={{padding:"16px 14px 0"}}>
      <div style={S.title}>СТАТИСТИКА</div>
      <PeriodSelector value={period} onChange={setPeriod}/>
      <div style={{fontSize:10,color:"#4b5563",marginBottom:14}}>{totalDays} дней с данными за выбранный период</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
        {[{label:"Стрик",value:streak+"🔥",sub:"70%+ привычек"},{label:"Тренировок",value:workoutDays,sub:"за период"},{label:"Срывов",value:sryvy,sub:"по углеводам"}].map(s=>(
          <div key={s.label} style={{...S.card,marginBottom:0,textAlign:"center",padding:"12px 8px"}}>
            <div style={{fontSize:10,color:"#4b5563",marginBottom:4}}>{s.label}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"#e2ddd6",lineHeight:1}}>{s.value}</div>
            <div style={{fontSize:9,color:"#374151",marginTop:2}}>{s.sub}</div>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        {[{label:"Настроение",value:avgMood?MOOD.find(m=>m.v===Math.round(+avgMood))?.l+" "+avgMood:"—",sub:"средн."},{label:"Эрекция",value:avgEr?avgEr+"/3":"—",sub:"средний балл"},{label:"Тиннитус",value:tinnitusCount,sub:"дней с симптомом"},{label:"Отл. сон",value:goodSleepCount,sub:"дней"}].map(s=>(
          <div key={s.label} style={{...S.card,marginBottom:0,textAlign:"center",padding:"12px 8px"}}>
            <div style={{fontSize:10,color:"#4b5563",marginBottom:4}}>{s.label}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#e2ddd6",lineHeight:1}}>{s.value}</div>
            <div style={{fontSize:9,color:"#374151",marginTop:2}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {workoutsByMonth.length>0&&(
        <div style={S.card}>
          <span style={S.lbl}>Тренировки по месяцам</span>
          {workoutsByMonth.map(([mk,count])=>(
            <div key={mk} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:12,color:"#9ca3af",textTransform:"capitalize"}}>{getMonthLabel(mk)}</span>
                <span style={{fontSize:13,fontWeight:600,color:"#4ade80"}}>{count}</span>
              </div>
              <div style={{height:4,background:"#1e1e28",borderRadius:3}}>
                <div style={{height:"100%",width:`${Math.min((count/20)*100,100)}%`,background:"#4ade80",borderRadius:3}}/>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={S.card}>
        <span style={S.lbl}>Привычки — выполнение</span>
        {[...habitStats,{id:"noCarbs",label:"Без срывов (углеводы)",icon:"🍭",pct:noCarbsPct}].map(h=>(
          <div key={h.id} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:13,color:"#9ca3af"}}>{h.icon} {h.label}</span>
              <span style={{fontSize:13,fontWeight:600,color:h.pct>=70?"#4ade80":h.pct>=40?"#eab308":"#f87171"}}>{h.pct}%</span>
            </div>
            <div style={{height:4,background:"#1e1e28",borderRadius:3}}>
              <div style={{height:"100%",width:`${h.pct}%`,background:h.pct>=70?"#4ade80":h.pct>=40?"#eab308":"#f87171",borderRadius:3,transition:"width 0.4s"}}/>
            </div>
          </div>
        ))}
      </div>

      <div style={S.card}>
        <span style={S.lbl}>Настроение</span>
        <div style={{display:"flex",gap:2,alignItems:"flex-end",height:60}}>
          {days.slice(-60).map(k=>{
            const mood=data[k]?.mood;
            const colors=["","#7f1d1d","#b45309","#854d0e","#166534","#15803d"];
            return <div key={k} style={{flex:1}}><div style={{width:"100%",borderRadius:"2px 2px 0 0",height:mood?`${mood*12}px`:2,background:mood?colors[mood]:"#1e1e28",transition:"height 0.3s"}}/></div>;
          })}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:9,color:"#374151"}}>
          <span>{days.length?parseKey(days[Math.max(0,days.length-60)]).toLocaleDateString("ru-RU",{day:"numeric",month:"short"}):""}</span>
          <span>сегодня</span>
        </div>
      </div>

      <div style={S.card}>
        <span style={S.lbl}>Активность — 90 дней</span>
        <div style={{display:"grid",gridTemplateColumns:"repeat(15,1fr)",gap:3}}>
          {heatDays.map(k=>(
            <div key={k} style={{aspectRatio:"1",borderRadius:3,background:scoreColor(getDayScore(data[k]),maxScore),border:k===todayKey()?"1px solid #4ade80":"none",position:"relative"}}>
              {data[k]?.habits?.workout&&<div style={{position:"absolute",top:1,right:1,width:3,height:3,borderRadius:"50%",background:"#4ade80"}}/>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function downloadFile(name,content,type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function normalizeBackup(raw){
  const source=raw?.data||raw;
  return {
    days:source?.days&&typeof source.days==="object"?source.days:{},
    weights:Array.isArray(source?.weights)?source.weights:[],
    measures:Array.isArray(source?.measures)?source.measures:[],
    analyses:Array.isArray(source?.analyses)?source.analyses:[],
  };
}

function DataTab({daysData,setDaysData}){
  const todayStr=todayKey();
  const [tab,setTab]=React.useState(0);
  const [measures,setMeasures]=React.useState(()=>load(SK_MEASURES,[]));
  const [analyses,setAnalyses]=React.useState(()=>load(SK_ANALYSES,[]));
  const [weights,setWeights]=React.useState(()=>load(SK_WEIGHTS,[]));
  const [backupStatus,setBackupStatus]=React.useState("");
  const importRef=React.useRef(null);
  const emptyM={date:todayStr,...Object.fromEntries(MEASURE_FIELDS.map(f=>[f.key,""]))};
  const emptyA={date:todayStr,...Object.fromEntries(ANALYSIS_FIELDS.map(f=>[f.key,""]))};
  const [mForm,setMForm]=React.useState(emptyM);
  const [aForm,setAForm]=React.useState(emptyA);
  const [wForm,setWForm]=React.useState({date:todayStr,value:""});

  function saveMeasure(){ const n=[...measures,{...mForm}]; setMeasures(n); save(SK_MEASURES,n); setMForm(emptyM); }
  function saveAnalysis(){ const n=[...analyses,{...aForm}]; setAnalyses(n); save(SK_ANALYSES,n); }
  function saveWeight(){ if(!wForm.value) return; const n=[...weights,{...wForm}]; setWeights(n); save(SK_WEIGHTS,n); setWForm({date:todayStr,value:""}); }

  function exportBackup(){
    const payload={
      backupVersion:1,
      app:"tracker",
      exportedAt:new Date().toISOString(),
      data:{
        days:daysData,
        weights,
        measures,
        analyses,
      },
    };
    downloadFile(`tracker-backup-${todayStr}.json`,JSON.stringify(payload,null,2),"application/json;charset=utf-8");
    setBackupStatus("Бэкап скачан");
  }

  function importBackup(e){
    const file=e.target.files?.[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const imported=normalizeBackup(JSON.parse(reader.result));
        const ok=window.confirm("Заменить текущие данные данными из бэкапа? Перед импортом лучше скачать свежий бэкап.");
        if(!ok) return;
        setDaysData(imported.days);
        setWeights(imported.weights);
        setMeasures(imported.measures);
        setAnalyses(imported.analyses);
        save(SK_DAYS,imported.days);
        save(SK_WEIGHTS,imported.weights);
        save(SK_MEASURES,imported.measures);
        save(SK_ANALYSES,imported.analyses);
        setBackupStatus("Бэкап загружен");
      }catch{
        setBackupStatus("Не удалось прочитать файл");
      }finally{
        e.target.value="";
      }
    };
    reader.readAsText(file);
  }

  const lastA=analyses.slice(-1)[0];

  return (
    <div style={{padding:"16px 14px 0"}}>
      <div style={S.title}>ДАННЫЕ</div>
      <div style={S.card}>
        <span style={S.lbl}>Бэкап</span>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <button onClick={exportBackup} style={S.saveBtn}>Скачать бэкап</button>
          <button onClick={()=>importRef.current?.click()} style={{...S.saveBtn,background:"#0d0d12",border:"1px solid #1e1e28",color:"#e2ddd6"}}>Загрузить бэкап</button>
        </div>
        <input ref={importRef} type="file" accept="application/json,.json" onChange={importBackup} style={{display:"none"}}/>
        <div style={{fontSize:10,color:"#4b5563",marginTop:8}}>
          Сохраняет все записи, заметки, вес, замеры и анализы.
        </div>
        {backupStatus&&<div style={{fontSize:11,color:"#4ade80",marginTop:8}}>{backupStatus}</div>}
      </div>
      <div style={{display:"flex",background:"#13131a",borderRadius:8,padding:3,marginBottom:14}}>
        {["Вес","Замеры","Анализы"].map((t,i)=>(
          <button key={t} onClick={()=>setTab(i)} style={{flex:1,padding:"8px 4px",background:tab===i?"#1e1e28":"none",border:"none",borderRadius:6,color:tab===i?"#e2ddd6":"#4b5563",fontSize:13,cursor:"pointer"}}>{t}</button>
        ))}
      </div>

      {tab===0&&(
        <>
          <div style={S.card}>
            <span style={S.lbl}>Вес (раз в неделю)</span>
            <div style={{marginBottom:8}}><label style={{fontSize:11,color:"#4b5563",display:"block",marginBottom:4}}>Дата</label><input type="date" value={wForm.date} onChange={e=>setWForm(f=>({...f,date:e.target.value}))} style={S.input}/></div>
            <div style={{marginBottom:12}}><label style={{fontSize:11,color:"#4b5563",display:"block",marginBottom:4}}>Вес (кг)</label><input type="number" step="0.1" placeholder="87.5" value={wForm.value} onChange={e=>setWForm(f=>({...f,value:e.target.value}))} style={S.input}/></div>
            <button onClick={saveWeight} style={S.saveBtn}>Сохранить</button>
          </div>
          {weights.length>0&&<div style={S.card}><span style={S.lbl}>История</span>{weights.slice().reverse().map((w,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #1e1e28"}}><span style={{color:"#4b5563",fontSize:12}}>{w.date}</span><span style={{color:"#e2ddd6",fontWeight:600}}>{w.value} кг</span></div>)}</div>}
        </>
      )}

      {tab===1&&(
        <>
          <div style={S.card}>
            <span style={S.lbl}>Замеры тела (раз в месяц)</span>
            <div style={{marginBottom:8}}><label style={{fontSize:11,color:"#4b5563",display:"block",marginBottom:4}}>Дата</label><input type="date" value={mForm.date} onChange={e=>setMForm(f=>({...f,date:e.target.value}))} style={S.input}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              {MEASURE_FIELDS.map(f=>(
                <div key={f.key}><label style={{fontSize:11,color:"#4b5563",display:"block",marginBottom:3}}>{f.label} ({f.unit})</label><input type="number" step="0.1" value={mForm[f.key]} onChange={e=>setMForm(fm=>({...fm,[f.key]:e.target.value}))} style={S.input}/></div>
              ))}
            </div>
            <button onClick={saveMeasure} style={S.saveBtn}>Сохранить замеры</button>
          </div>
          {measures.length>0&&<div style={S.card}><span style={S.lbl}>История</span>{measures.slice().reverse().map((m,i)=><div key={i} style={{padding:"10px 0",borderBottom:"1px solid #1e1e28"}}><div style={{color:"#4ade80",fontSize:12,marginBottom:6}}>{m.date}</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{MEASURE_FIELDS.filter(f=>m[f.key]).map(f=><span key={f.key} style={{background:"#1e1e28",borderRadius:6,padding:"3px 8px",fontSize:11,color:"#9ca3af"}}>{f.label}: <span style={{color:"#e2ddd6"}}>{m[f.key]}</span></span>)}</div></div>)}</div>}
        </>
      )}

      {tab===2&&(
        <>
          <div style={S.card}>
            <span style={S.lbl}>Базовые (27.01.2026)</span>
            {ANALYSIS_FIELDS.map(f=>{
              const current=lastA?.[f.key]?parseFloat(lastA[f.key]):f.baseline;
              const isGood=current!=null&&f.higher!=null?(f.higher?current>f.baseline:current<f.baseline):null;
              return (
                <div key={f.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #1e1e28"}}>
                  <div><div style={{fontSize:13,color:"#9ca3af"}}>{f.label}</div><div style={{fontSize:10,color:"#374151"}}>цель: {f.target}</div></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:15,fontWeight:600,color:isGood===true?"#4ade80":isGood===false?"#f87171":"#e2ddd6"}}>{current??"—"}</div><div style={{fontSize:10,color:"#374151"}}>{f.unit}</div></div>
                </div>
              );
            })}
          </div>
          <div style={S.card}>
            <span style={S.lbl}>Добавить анализы</span>
            <div style={{marginBottom:8}}><label style={{fontSize:11,color:"#4b5563",display:"block",marginBottom:4}}>Дата</label><input type="date" value={aForm.date} onChange={e=>setAForm(f=>({...f,date:e.target.value}))} style={S.input}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              {ANALYSIS_FIELDS.map(f=><div key={f.key}><label style={{fontSize:10,color:"#4b5563",display:"block",marginBottom:3}}>{f.label} ({f.unit})</label><input type="number" step="0.01" value={aForm[f.key]} onChange={e=>setAForm(fm=>({...fm,[f.key]:e.target.value}))} style={S.input}/></div>)}
            </div>
            <button onClick={saveAnalysis} style={S.saveBtn}>Сохранить анализы</button>
          </div>
          {analyses.length>0&&<div style={S.card}><span style={S.lbl}>История анализов</span>{analyses.slice().reverse().map((a,i)=><div key={i} style={{padding:"10px 0",borderBottom:"1px solid #1e1e28"}}><div style={{color:"#4ade80",fontSize:12,marginBottom:6}}>{a.date}</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{ANALYSIS_FIELDS.filter(f=>a[f.key]).map(f=><span key={f.key} style={{background:"#1e1e28",borderRadius:6,padding:"3px 8px",fontSize:11,color:"#9ca3af"}}>{f.label}: <span style={{color:"#e2ddd6"}}>{a[f.key]}</span></span>)}</div></div>)}</div>}
        </>
      )}
    </div>
  );
}

const NAV=[
  {id:0,icon:"◉",label:"Сегодня"},
  {id:1,icon:"☰",label:"График"},
  {id:2,icon:"▦",label:"Календарь"},
  {id:3,icon:"↗",label:"Статистика"},
  {id:4,icon:"≡",label:"Данные"},
];

function App(){
  const [tab,setTab]=React.useState(0);
  const [data,setData]=React.useState(()=>load(SK_DAYS,{}));

  return (
    <div style={S.app}>
      {tab===0&&<TodayTab data={data} setData={setData}/>}
      {tab===1&&<ScheduleTab/>}
      {tab===2&&<CalendarTab data={data}/>}
      {tab===3&&<StatsTab data={data}/>}
      {tab===4&&<DataTab daysData={data} setDaysData={setData}/>}
      <nav style={S.nav}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={S.navBtn(tab===n.id)}>
            <span style={{fontSize:20}}>{n.icon}</span>
            <span>{n.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
